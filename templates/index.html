<!DOCTYPE html>
<html>
<head><title>Student Registration</title></head>
<body>
    <h1>Student List</h1>
    
    <form method="GET" action="/search">
        <input name="q" placeholder="Search by name..." value="{{ query if query else '' }}">
        <button type="submit">Search</button>
        <a href="/">Reset</a>
    </form>
    <br>
    
    <table border="1">
        <tr><th>ID</th><th>Name</th><th>Program</th><th>Action</th></tr>
        {% for student in students %}
        <tr>
            <td>{{ student.student_id }}</td>
            <td>{{ student.full_name }}</td>
            <td>{{ student.program }}</td>
            <td><a href="/delete/{{ student.student_id }}" onclick="return confirm('Delete?')">Delete</a></td>
        </tr>
        {% endfor %}
    </table>
    
    <h2>Add Student</h2>
    <form method="POST" action="/add">
        <input name="name" placeholder="Full Name" required>
        <input name="program" placeholder="Program" required>
        <button type="submit">Add</button>
    </form>
</body>
</html>
